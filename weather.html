<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Los Angeles, right now — Kevin Haulihan</title>
  <meta name="description" content="A living pixel-art diorama of Los Angeles — its sky, sun, tide, surf, wind, and temperature, right now. From the portfolio of Kevin Haulihan." />
  <meta name="robots" content="noindex, follow" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" href="https://kevinhaulihan.online/weather" />

  <!-- Pre-paint setup, inlined so the page never flashes: (1) resolve the theme
       (stored choice → light default); (2) size the diorama to the largest whole
       integer multiple of its 100px base that fits the viewport, and keep it in
       step on resize. Authorized by the CSP sha256 hash below; the test suite
       verifies the hash matches this exact script content. -->
  <script>
(function () {
  var root = document.documentElement;
  // Light-only site, matching the rest of the pages.
  root.setAttribute("data-theme", "light");

  // Integer-only upscale: pick the biggest N so N*100px fits the smaller viewport
  // axis (with a little breathing room). Keeps every source pixel a whole block —
  // no blur, no half-pixels. Centering is handled in CSS.
  function fit() {
    var pad = 16;
    var avail = Math.min(window.innerWidth, window.innerHeight) - pad * 2;
    var n = Math.floor(avail / 100);
    if (n < 1) { n = 1; }
    root.style.setProperty("--scene-size", (n * 100) + "px");
  }
  fit();
  var t;
  window.addEventListener("resize", function () { clearTimeout(t); t = setTimeout(fit, 120); });
})();
</script>

  <!-- Content Security Policy: same-origin only, plus the keyless
       weather/marine/air-quality/tide data APIs the diorama reads (connect-src,
       data only). No third-party scripts, styles, or fonts on this page. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self' 'sha256-JOwR4M9FmFiLSdoQpNH8kzvz3rmDnCOtoGMpLoxcVsc='; connect-src 'self' https://api.open-meteo.com https://marine-api.open-meteo.com https://air-quality-api.open-meteo.com https://api.tidesandcurrents.noaa.gov; base-uri 'self'; form-action 'none'; object-src 'none'" />
